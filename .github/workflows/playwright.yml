name: Playwright Tests + Allure + Slack (Ultimate)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      #  Slack Start Notification
      - name: Slack Start Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \" Playwright Started\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\nCommit: ${{ github.sha }}\nMessage: ${{ github.event.head_commit.message }}\nTime: $(date)\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      #  Run Tests (DON'T FAIL PIPELINE IMMEDIATELY)
      - name: Run Playwright Tests
        run: npx playwright test || true

      #  Upload Screenshots & Videos
      - name: Upload Artifacts (Screenshots + Videos)
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      #  Debug JSON
      - name: Debug JSON
        run: cat results.json || echo "No JSON found"

      #  Extract Results + Failed Tests
      - name: Parse Results
        id: results
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          PASSED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="passed")] | length' results.json)
          FAILED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="failed")] | length' results.json)
          TOTAL=$(jq '[.suites[].specs[].tests[].results[]] | length' results.json)

          FAILED_TESTS=$(jq -r '.suites[].specs[] | select(.tests[].results[].status=="failed") | .title' results.json | paste -sd "," -)

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT

      #  Install Allure
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        run: allure generate allure-results --clean

      #  Deploy Report
      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      #  Save URLs
      - name: Set URLs
        id: urls
        run: |
          echo "report=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          echo "logs=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "artifacts=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts" >> $GITHUB_OUTPUT

      #  Slack Success
      - name: Slack Success Notification
        if: steps.results.outputs.failed == '0'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \" Tests Passed\nTotal: ${{ steps.results.outputs.total }} | Passed: ${{ steps.results.outputs.passed }}\n👤 ${{ github.actor }}\n🔗 Report: ${{ steps.urls.outputs.report }}\n📂 Artifacts: ${{ steps.urls.outputs.artifacts }}\n📝 Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Slack Failure (WITH FAILED TEST NAMES + ARTIFACTS)
      - name: Slack Failure Notification
        if: steps.results.outputs.failed != '0'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \" Tests Failed\nTotal: ${{ steps.results.outputs.total }} | Failed: ${{ steps.results.outputs.failed }}\n\n🔴 Failed Tests:\n${{ steps.results.outputs.failed_tests }}\n\n👤 ${{ github.actor }}\n🕒 $(date)\n\n📊 Report: ${{ steps.urls.outputs.report }}\n📂 Download Screenshots/Videos: ${{ steps.urls.outputs.artifacts }}\n🧾 Logs: ${{ steps.urls.outputs.logs }}\n📝 Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Fail job at end if tests failed
      - name: Fail Job
        if: steps.results.outputs.failed != '0'
        run: exit 1