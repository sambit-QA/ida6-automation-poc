name: Playwright Tests + Allure + Slack (Final Fixed)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      #  Slack Start Notification (IST + Clean UI)
      - name: Slack Start Notification
        run: |
          TIME=$(TZ='Asia/Kolkata' date '+%d %b %Y | %I:%M %p IST')

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"🚀 Playwright Execution Started\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Repo:*\\n${{ github.repository }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n${{ github.ref_name }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*User:*\\n${{ github.actor }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Time:*\\n$TIME\" }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Checkout
      - uses: actions/checkout@v4

      #  Node Setup
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      #  Install Dependencies
      - name: Install Dependencies
        run: npm install

      #  Install Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      #  Run Tests (do not fail immediately)
      - name: Run Playwright Tests
        run: npx playwright test || true

      #  Upload Screenshots & Videos
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      #  Debug JSON
      - name: Debug JSON
        run: cat results.json || echo "No results.json found"

      #  Parse Results (FIXED LOGIC)
      - name: Parse Results
        id: results
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          if [ ! -f results.json ]; then
            echo "No results.json found!"
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "failed_tests=None" >> $GITHUB_OUTPUT
            exit 0
          fi

          PASSED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="passed")] | length' results.json)
          FAILED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="failed")] | length' results.json)
          TOTAL=$((PASSED + FAILED))

          FAILED_TESTS=$(jq -r '
          .suites[].specs[]?.tests[]?.results[]? 
          | select(.status=="failed") 
          | .error?.message // "Failed Test"
          ' results.json | paste -sd "\n" -)

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT

      #  Install Allure
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      #  Generate Allure Report
      - name: Generate Allure Report
        run: allure generate allure-results --clean

      #  Deploy Report
      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      #  Generate URLs
      - name: Set URLs
        id: urls
        run: |
          echo "report=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          echo "logs=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "artifacts=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts" >> $GITHUB_OUTPUT

      #  Slack Success Notification
      - name: Slack Success Notification
        if: steps.results.outputs.failed == '0'
        run: |
          TIME=$(TZ='Asia/Kolkata' date '+%d %b %Y | %I:%M %p IST')

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"✅ Test Execution Passed\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Total:*\\n${{ steps.results.outputs.total }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Passed:*\\n${{ steps.results.outputs.passed }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Failed:*\\n0\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Executed by:*\\n${{ github.actor }}\" }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Report\" },
                    \"url\": \"${{ steps.urls.outputs.report }}\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Artifacts\" },
                    \"url\": \"${{ steps.urls.outputs.artifacts }}\"
                  }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Slack Failure Notification
      - name: Slack Failure Notification
        if: steps.results.outputs.failed != '0'
        run: |
          TIME=$(TZ='Asia/Kolkata' date '+%d %b %Y | %I:%M %p IST')

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"❌ Test Execution Failed\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Total:*\\n${{ steps.results.outputs.total }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Passed:*\\n${{ steps.results.outputs.passed }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Failed:*\\n${{ steps.results.outputs.failed }}\" }
                ]
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Failed Tests:*\\n${{ steps.results.outputs.failed_tests }}\"
                }
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Report\" },
                    \"url\": \"${{ steps.urls.outputs.report }}\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Artifacts\" },
                    \"url\": \"${{ steps.urls.outputs.artifacts }}\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Logs\" },
                    \"url\": \"${{ steps.urls.outputs.logs }}\"
                  }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Fail pipeline at end
      - name: Fail Job
        if: steps.results.outputs.failed != '0'
        run: exit 1