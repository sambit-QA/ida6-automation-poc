name: Playwright Tests + Allure + Slack (Advanced)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      #  Start Notification (Slack Blocks)
      - name: Slack Start Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🚀 Workflow Started" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                ]
              }
            ]
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npx playwright install --with-deps

      # 🧪 Run Tests (capture output)
      - name: Run Playwright Tests
        run: |
          npx playwright test --reporter=json > test-results.json

      # 📊 Extract Test Summary
      - name: Parse Test Results
        id: results
        run: |
          PASSED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="passed")] | length' test-results.json)
          FAILED=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="failed")] | length' test-results.json)
          TOTAL=$(jq '[.suites[].specs[].tests[].results[]] | length' test-results.json)

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        run: allure generate allure-results --clean

      # 🌐 Deploy Allure to GitHub Pages
      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      # ✅ Success Notification (Slack Blocks)
      - name: Slack Success Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"✅ Tests Passed\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Total:*\n${{ steps.results.outputs.total }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Passed:*\n${{ steps.results.outputs.passed }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Failed:*\n${{ steps.results.outputs.failed }}\" }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Report\" },
                    \"url\": \"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Logs\" },
                    \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Failure Notification (Slack Blocks)
      - name: Slack Failure Notification
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"❌ Tests Failed\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Total:*\n${{ steps.results.outputs.total }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Passed:*\n${{ steps.results.outputs.passed }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Failed:*\n${{ steps.results.outputs.failed }}\" }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Check Logs\" },
                    \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}